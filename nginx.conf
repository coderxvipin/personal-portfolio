events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    sendfile        on;
    keepalive_timeout 65;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1000;

    # ─────────────────────────────────────────
    # Server 1: Redirect HTTP → HTTPS
    # ─────────────────────────────────────────
    server {
        listen 80;
        server_name coderxvipin.in www.coderxvipin.in;

        # Required for Certbot domain verification
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect all HTTP to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─────────────────────────────────────────
    # Server 2: HTTPS with SSL
    # ─────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name coderxvipin.in www.coderxvipin.in;

        root /usr/share/nginx/html;
        index index.html;

        # SSL certificate paths
        ssl_certificate     /etc/letsencrypt/live/coderxvipin.in/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/coderxvipin.in/privkey.pem;

        # Strong SSL settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # HSTS — force HTTPS for 1 year
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
        add_header X-XSS-Protection "1; mode=block";

        location / {
            try_files $uri $uri/ /index.html;
        }

        # Cache static assets
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }
}
